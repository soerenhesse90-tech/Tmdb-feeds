name: Build & Deploy TMDB RSS Feeds

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Feeds generieren
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python tmdb_rss.py

      - name: Kombi-Feed generieren
        run: python mixed_feed.py

      - name: Startseite mitkopieren
        run: cp index.html public/index.html

      - name: Als Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
